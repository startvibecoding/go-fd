name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and release
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Build distribution packages
        run: make dist

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: dist/**
          if-no-files-found: error

      - name: Verify release assets
        run: |
          set -euo pipefail
          mapfile -t assets < <(
            find dist -type f \( \
              -name "*.tar.gz" -o \
              -name "*.tar.gz.sha256" -o \
              -name "*.zip" -o \
              -name "*.zip.sha256" -o \
              -name "checksums.txt" \
            \) | sort
          )

          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found under dist/" >&2
            exit 1
          fi

          printf "Release assets:\n"
          printf "  %s\n" "${assets[@]}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mapfile -t assets < <(
            find dist -type f \( \
              -name "*.tar.gz" -o \
              -name "*.tar.gz.sha256" -o \
              -name "*.zip" -o \
              -name "*.zip.sha256" -o \
              -name "checksums.txt" \
            \) | sort
          )

          gh release upload "${GITHUB_REF_NAME}" "${assets[@]}" --clobber
